name: CI

on:
  push:
  pull_request:

  workflow_dispatch:

  # to execute once a day (more info see https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule )
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update system dependencies
        run: |
          sudo apt-get update

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

  nodeJsBaselineAptCompatibilityCheckOfUpstreamPiRepo:
    name: NodeJS installed from stock Ubuntu-LTS packages (not external sources)

    # TODO: change to 26.04 when it is released
    runs-on: ubuntu-24.04
    container:
      image: "ubuntu:26.04"
    env:
      PI_VERSION: "0.65.0"
    steps:
      - name: Install dependencies
        run: |
          apt update --yes

          # NOTE: do not change the below with an `actions/setup-node` step! or it
          # would make this CI job entirely pointless
          apt install --yes npm git wget

      - name: Print versions
        run: node --version && npm --version

      - name: Set IS_SCHEDULED env var
        run: echo "IS_SCHEDULED=${{ github.event_name == 'schedule' }}" >> $GITHUB_ENV

      - name: Test Pi from git main branch with NodeJS version from latest Ubuntu LTS
        run: |
          git clone https://github.com/badlogic/pi-mono.git
          cd pi-mono
          if [ "$IS_SCHEDULED" != "true" ]; then
            git switch --detach v${PI_VERSION}
          fi
          npm install
          npm run build
          npm run check
          ./test.sh
          ./pi-test.sh --version
          ./pi-test.sh --version > ../last_version.txt 2>&1
          cd ..
          rm -rf pi-mono

      - name: Download and Install latest Pi release
        run: |
          VERSION=$(cat last_version.txt)
          URL="https://github.com/badlogic/pi-mono/releases/download/v${VERSION}/pi-linux-x64.tar.gz"
          wget "$URL"
          tar -xzf "pi-linux-x64.tar.gz"
          ./pi/pi install git:github.com/${GITHUB_REPOSITORY}@${{ (github.event_name == 'pull_request' && github.event.pull_request.base.sha) || github.sha }}
          ./pi/pi --version

